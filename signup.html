<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign Up — STINKK CUSTOMZ</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="logo">STINKK CUSTOMZ</h1>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="auth-page">
      <div class="container auth-card">
        <h2 class="auth-title">Create Your Account</h2>
        <p>Join the movement. Sign up to shop our latest looks.</p>
        <form class="auth-form" id="signupForm">
          <label>Name
            <input type="text" name="name" required>
          </label>
          <label>Username
            <input type="text" name="username" required>
          </label>
          <label>Email
            <input type="email" name="email" required>
          </label>
          <label>Password
            <input type="password" name="password" required>
          </label>
          <button class="btn" type="submit">Sign Up</button>
          <p class="auth-footer">Already have an account? <a href="login.html">Login</a></p>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">© STINKK CUSTOMZ — All rights reserved</div>
  </footer>
  <script src="script.js"></script>
</body>
</html>
