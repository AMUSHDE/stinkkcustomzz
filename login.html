<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — STINKK CUSTOMZ</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="logo">STINKK CUSTOMZ</h1>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="settings.html">Settings</a>
        <a href="signup.html">Sign Up</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="auth-page">
      <div class="container auth-card">
        <h2 class="auth-title">Welcome Back</h2>
        <p>Sign in to access exclusive drops and your account.</p>
        <form class="auth-form" id="loginForm">
          <label>Email
            <input type="email" name="email" required>
          </label>
          <label>Password
            <input type="password" name="password" required>
          </label>
          <button class="btn" type="submit">Login</button>
          <p class="auth-footer">New here? <a href="signup.html">Create an account</a></p>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">© STINKK CUSTOMZ — All rights reserved</div>
  </footer>
  <script src="script.js"></script>
</body>
</html>
